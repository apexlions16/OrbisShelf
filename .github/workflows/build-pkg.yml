name: Build PS4 PKG

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate catalog and generate icon
        run: |
          python scripts/validate_catalog.py catalog/catalog.json
          mkdir -p sce_sys
          python tools/generate_icon.py sce_sys/icon0.png

      - name: Build OpenOrbis SDK container
        id: sdk
        continue-on-error: true
        run: |
          docker build --progress=plain \
            --build-arg OO_TOOLCHAIN_VERSION=v0.5.4 \
            --tag orbisshelf-openorbis:v0.5.4 \
            https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git#v0.5.4 \
            > openorbis-build.log 2>&1

      - name: Upload OpenOrbis diagnostics
        if: steps.sdk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: openorbis-build-diagnostics
          path: openorbis-build.log
          if-no-files-found: error

      - name: Stop after SDK failure
        if: steps.sdk.outcome == 'failure'
        run: |
          tail -n 80 openorbis-build.log
          exit 1

      - name: Build OrbisShelf PKG
        run: |
          chmod -R a+rwX "$GITHUB_WORKSPACE"
          if ! docker run --rm --user 0:0 \
            --volume "$GITHUB_WORKSPACE:/work" \
            --workdir /work \
            orbisshelf-openorbis:v0.5.4 \
            bash -lc 'make IV0000-ORBS00001_00-ORBISSHELF000001.pkg' \
            > orbisshelf-build.log 2>&1; then
            cat orbisshelf-build.log
            exit 1
          fi
          cat orbisshelf-build.log
          test -s IV0000-ORBS00001_00-ORBISSHELF000001.pkg
          sha256sum IV0000-ORBS00001_00-ORBISSHELF000001.pkg > OrbisShelf-v0.1.0.pkg.sha256
          cp IV0000-ORBS00001_00-ORBISSHELF000001.pkg OrbisShelf-v0.1.0.pkg

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrbisShelf-v0.1.0-PS4
          path: |
            OrbisShelf-v0.1.0.pkg
            OrbisShelf-v0.1.0.pkg.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.1.0
        run: |
          NOTES=$(cat <<'EOF'
          First test build of OrbisShelf for jailbroken PlayStation 4 systems.

          Token file for a private Hugging Face repository:
          /data/OrbisShelf/hf_token.txt

          Put only the token in that file, with no quotes. A public Hugging Face repository does not require a token.
          EOF
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" OrbisShelf-v0.1.0.pkg OrbisShelf-v0.1.0.pkg.sha256 --clobber
          else
            gh release create "$TAG" OrbisShelf-v0.1.0.pkg OrbisShelf-v0.1.0.pkg.sha256 \
              --title "OrbisShelf v0.1.0" \
              --notes "$NOTES"
          fi
