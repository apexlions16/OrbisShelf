name: Build PS4 PKG

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate catalog and generate icon
        run: |
          python scripts/validate_catalog.py catalog/catalog.json
          mkdir -p sce_sys
          python tools/generate_icon.py sce_sys/icon0.png

      - name: Download OpenOrbis v0.5.4 SDK
        id: sdk
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash -euxo pipefail <<'SCRIPT' > openorbis-sdk.log 2>&1
          SDK_URL=$(gh api repos/OpenOrbis/OpenOrbis-PS4-Toolchain/releases/tags/v0.5.4 \
            --jq '.assets[] | select(.name == "toolchain-llvm-18.tar.gz") | .browser_download_url')
          test -n "$SDK_URL"
          curl --fail --location --retry 3 "$SDK_URL" --output openorbis-sdk.tar.gz
          rm -rf .openorbis-sdk
          mkdir -p .openorbis-sdk
          tar -xzf openorbis-sdk.tar.gz -C .openorbis-sdk
          LINK_X=$(find "$GITHUB_WORKSPACE/.openorbis-sdk" -type f -name link.x -print -quit)
          test -n "$LINK_X"
          TOOLCHAIN_ROOT=$(dirname "$LINK_X")
          chmod +x "$TOOLCHAIN_ROOT/bin/linux/"*
          test -x "$TOOLCHAIN_ROOT/bin/linux/PkgTool.Core"
          test -f "$TOOLCHAIN_ROOT/src/modules/right.sprx"
          test -f "$TOOLCHAIN_ROOT/src/modules/libSceFios2.prx"
          test -f "$TOOLCHAIN_ROOT/src/modules/libc.prx"
          echo "TOOLCHAIN_ROOT=$TOOLCHAIN_ROOT" >> "$GITHUB_ENV"
          SCRIPT

      - name: Upload SDK diagnostics
        if: steps.sdk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: openorbis-sdk-diagnostics
          path: openorbis-sdk.log
          if-no-files-found: error

      - name: Stop after SDK failure
        if: steps.sdk.outcome == 'failure'
        run: |
          cat openorbis-sdk.log
          exit 1

      - name: Compile with LLVM 18
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang-18 lld-18
          export OO_PS4_TOOLCHAIN="$TOOLCHAIN_ROOT"
          if ! make CC=clang-18 CXX=clang++-18 LD=ld.lld-18 eboot.bin > orbisshelf-compile.log 2>&1; then
            cat orbisshelf-compile.log
            exit 1
          fi
          cat orbisshelf-compile.log
          test -s eboot.bin

      - name: Package PKG with OpenOrbis tools
        run: |
          chmod -R a+rwX "$GITHUB_WORKSPACE"
          if ! docker run --rm --user 0:0 \
            --env OO_PS4_TOOLCHAIN=/opt/openorbis \
            --volume "$GITHUB_WORKSPACE:/work" \
            --volume "$TOOLCHAIN_ROOT:/opt/openorbis" \
            --workdir /work \
            ubuntu:20.04 \
            bash -lc '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y --no-install-recommends make libicu66 libssl1.1 ca-certificates python3
              make IV0000-ORBS00001_00-ORBISSHELF000001.pkg
            ' > orbisshelf-package.log 2>&1; then
            cat orbisshelf-package.log
            exit 1
          fi
          cat orbisshelf-package.log
          test -s IV0000-ORBS00001_00-ORBISSHELF000001.pkg
          cp IV0000-ORBS00001_00-ORBISSHELF000001.pkg OrbisShelf-v0.2.0.pkg
          sha256sum OrbisShelf-v0.2.0.pkg > OrbisShelf-v0.2.0.pkg.sha256

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: orbisshelf-build-diagnostics
          path: |
            orbisshelf-compile.log
            orbisshelf-package.log
          if-no-files-found: ignore

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrbisShelf-v0.2.0-PS4
          path: |
            OrbisShelf-v0.2.0.pkg
            OrbisShelf-v0.2.0.pkg.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v0.2.0
        run: |
          NOTES=$(cat <<'EOF'
          Stability test build for local PS4 PKG installation.

          Changes:
          - keeps BGFT state alive while the PS4 consumes the downloaded PKG
          - starts the PS4 install task immediately after download and verification
          - shows download percentage and transfer speed
          - shows PS4 installation percentage when reported by BGFT
          - retains the downloaded PKG after installation for this stability build
          - records the last installation stage in /data/OrbisShelf/install_stage.txt

          Use only with PKGs you created or are authorized to redistribute.
          EOF
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" OrbisShelf-v0.2.0.pkg OrbisShelf-v0.2.0.pkg.sha256 --clobber
          else
            gh release create "$TAG" OrbisShelf-v0.2.0.pkg OrbisShelf-v0.2.0.pkg.sha256 \
              --title "OrbisShelf v0.2.0" \
              --notes "$NOTES"
          fi
